<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>multi_agent_crawler</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
  header {
    background: #1a1a2e; color: #e0e0e0; padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  header h1 { font-size: 1.15rem; font-weight: 600; }
  header span { font-size: 0.8rem; color: #888; }
  main { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem; display: grid; gap: 1rem; }
  .card {
    background: #fff; border-radius: 8px; padding: 1.25rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h2 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase;
             letter-spacing: .05em; color: #555; margin-bottom: .9rem; }
  .row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; }
  input[type=text], input[type=number] {
    border: 1px solid #d0d0d0; border-radius: 5px; padding: .45rem .7rem;
    font-size: .9rem; outline: none; flex: 1; min-width: 120px;
  }
  input:focus { border-color: #5c6bc0; }
  button {
    padding: .45rem 1rem; font-size: .9rem; border: none; border-radius: 5px;
    cursor: pointer; white-space: nowrap;
  }
  .btn-primary { background: #5c6bc0; color: #fff; }
  .btn-primary:hover { background: #3f51b5; }
  .btn-secondary { background: #e8eaf6; color: #3f51b5; }
  .btn-secondary:hover { background: #c5cae9; }
  .btn-warn { background: #ff8a65; color: #fff; }
  .btn-warn:hover { background: #e64a19; }
  label { font-size: .8rem; color: #666; display: block; margin-bottom: .25rem; }
  .field { display: flex; flex-direction: column; }
  .msg {
    margin-top: .7rem; font-size: .85rem; padding: .5rem .8rem;
    border-radius: 5px; display: none;
  }
  .msg.ok  { background: #e8f5e9; color: #2e7d32; }
  .msg.err { background: #ffebee; color: #c62828; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { text-align: left; padding: .5rem .6rem; background: #f0f0f0;
       color: #555; font-weight: 600; }
  td { padding: .45rem .6rem; border-bottom: 1px solid #f0f0f0; word-break: break-all; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .empty { color: #aaa; font-size: .85rem; padding: .5rem 0; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: .6rem; }
  .stat-box { background: #f5f5f5; border-radius: 6px; padding: .6rem .8rem; }
  .stat-box .val { font-size: 1.4rem; font-weight: 700; color: #3f51b5; }
  .stat-box .lbl { font-size: .75rem; color: #777; margin-top: .1rem; }
  .tag { display: inline-block; padding: .15rem .5rem; border-radius: 3px; font-size: .75rem; }
  .tag-ok  { background: #e8f5e9; color: #2e7d32; }
  .tag-warn { background: #fff3e0; color: #e65100; }
  .tag-err  { background: #ffebee; color: #c62828; }
  @media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>multi_agent_crawler</h1>
  <span>local web UI</span>
</header>

<main>

  <!-- Index + Step -->
  <div class="grid2">

    <div class="card">
      <h2>Index</h2>
      <div class="row">
        <div class="field" style="flex:3">
          <label for="url">Origin URL</label>
          <input id="url" type="text" placeholder="https://example.com" value="https://example.com">
        </div>
        <div class="field" style="flex:0 0 80px">
          <label for="depth">Depth</label>
          <input id="depth" type="number" min="0" max="10" value="1">
        </div>
        <button class="btn-primary" onclick="doIndex()">Index</button>
      </div>
      <div id="index-msg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Step / Run</h2>
      <p style="font-size:.85rem;color:#666;margin-bottom:.8rem">
        Step fetches one page. Run All drains the full frontier.
      </p>
      <div class="row">
        <button class="btn-warn" onclick="doStep()">Step</button>
        <button class="btn-primary" onclick="doRunAll()">Run All</button>
      </div>
      <div id="step-msg" class="msg"></div>
    </div>

  </div>

  <!-- Search -->
  <div class="card">
    <h2>Search</h2>
    <div class="row">
      <input id="query" type="text" placeholder="Enter search terms…" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-primary" onclick="doSearch()">Search</button>
    </div>
    <div id="search-results" style="margin-top:.8rem"></div>
  </div>

  <!-- Jobs + Status -->
  <div class="grid2">

    <div class="card">
      <h2>Jobs <button class="btn-secondary" style="float:right;font-size:.75rem;padding:.25rem .6rem" onclick="loadJobs()">Refresh</button></h2>
      <div id="jobs-table"><p class="empty">No jobs yet.</p></div>
    </div>

    <div class="card">
      <h2>Status <button class="btn-secondary" style="float:right;font-size:.75rem;padding:.25rem .6rem" onclick="loadStatus()">Refresh</button></h2>
      <div id="status-grid" class="stat-grid"><p class="empty">Loading…</p></div>
    </div>

  </div>

</main>

<script>
const api = (path, opts) =>
  fetch(path, opts).then(r => r.json()).catch(() => ({ error: 'network error' }));

function showMsg(id, text, isErr) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isErr ? 'err' : 'ok');
  el.style.display = 'block';
}

async function doIndex() {
  const url   = document.getElementById('url').value.trim();
  const depth = parseInt(document.getElementById('depth').value, 10);
  const res = await api('/api/index', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, depth }),
  });
  if (res.error) {
    showMsg('index-msg', 'Error: ' + res.error, true);
  } else {
    showMsg('index-msg', `Job ${res.job_id} created — ${res.origin_url} (max depth ${res.max_depth})`, false);
    loadJobs(); loadStatus();
  }
}

async function doStep() {
  const res = await api('/api/step', { method: 'POST' });
  if (res.error) {
    showMsg('step-msg', 'Error: ' + res.error, true);
  } else if (!res.processed) {
    showMsg('step-msg', 'Frontier is empty — nothing to process.', true);
  } else {
    const t = res.title ? ` "${res.title}"` : '';
    showMsg('step-msg',
      `[${res.outcome}] ${res.url}${t} — ${res.links_found} links, ${res.children_admitted} children admitted`,
      false);
    loadStatus(); loadJobs();
  }
}

async function doRunAll() {
  showMsg('step-msg', 'Running…', false);
  const res = await api('/api/run', { method: 'POST' });
  if (res.error) {
    showMsg('step-msg', 'Error: ' + res.error, true);
  } else if (res.processed_count === 0) {
    showMsg('step-msg', 'Frontier was empty — nothing to process.', true);
  } else {
    showMsg('step-msg',
      `Run complete — ${res.processed_count} pages processed ` +
      `(html: ${res.html_success_count}, non-html: ${res.non_html_count}, ` +
      `failed: ${res.failed_count}, children admitted: ${res.children_admitted_total})`,
      false);
    loadStatus(); loadJobs();
  }
}

async function doSearch() {
  const q = document.getElementById('query').value.trim();
  const container = document.getElementById('search-results');
  if (!q) { container.innerHTML = ''; return; }
  const res = await api('/api/search?q=' + encodeURIComponent(q));
  if (!Array.isArray(res) || res.length === 0) {
    container.innerHTML = '<p class="empty">(no results)</p>';
    return;
  }
  container.innerHTML = `
    <table>
      <thead><tr><th>Relevant URL</th><th>Origin URL</th><th>Depth</th></tr></thead>
      <tbody>
        ${res.map(r => `<tr>
          <td><a href="${r.relevant_url}" target="_blank">${r.relevant_url}</a></td>
          <td>${r.origin_url}</td>
          <td>${r.depth}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function loadJobs() {
  const rows = await api('/api/jobs');
  const el = document.getElementById('jobs-table');
  if (!Array.isArray(rows) || rows.length === 0) {
    el.innerHTML = '<p class="empty">No jobs yet.</p>'; return;
  }
  el.innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>Origin</th><th>Depth</th><th>Status</th></tr></thead>
      <tbody>
        ${rows.map(j => `<tr>
          <td><a href="/jobs/${j.job_id}" style="font-family:monospace;font-size:.85em">${j.job_id}</a></td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
              title="${j.origin_url}">${j.origin_url}</td>
          <td>${j.max_depth}</td>
          <td><span class="tag ${j.status==='done'?'tag-ok':j.status==='failed'||j.status==='cancelled'?'tag-err':'tag-warn'}">${j.status}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function loadStatus() {
  const s = await api('/api/status');
  const el = document.getElementById('status-grid');
  if (s.error) { el.innerHTML = '<p class="empty">Error loading status.</p>'; return; }

  const items = [
    ['crawl jobs',    s.crawl_jobs_total],
    ['pages',         s.pages_total],
    ['discoveries',   s.discoveries_total],
    ['page links',    s.page_links_total],
    ['terms',         s.terms_total],
    ['postings',      s.postings_total],
    ['frontier',      s.frontier_size + ' / ' + s.frontier_capacity],
    ['backpressure',  s.backpressure ? '⚠ yes' : 'no'],
  ];
  el.innerHTML = items.map(([lbl, val]) => `
    <div class="stat-box">
      <div class="val">${val}</div>
      <div class="lbl">${lbl}</div>
    </div>`).join('');
}

// initial load
loadJobs(); loadStatus();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}crawler{% endblock %} — multi_agent_crawler</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

/* ── NAV ─────────────────────────────────────────────── */
.topnav {
  background: #1a1a2e; display: flex; align-items: center;
  padding: 0 1.5rem; height: 52px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 6px rgba(0,0,0,.35);
}
.nav-brand { display: flex; align-items: center; gap: .4rem; margin-right: 1.8rem; flex-shrink: 0; }
.nav-brand a { color: #e8eaf6; font-weight: 700; font-size: .95rem; text-decoration: none; letter-spacing: -.01em; }
.nav-brand .dot { color: #7986cb; }
.nav-links { display: flex; align-items: stretch; gap: 0; overflow-x: auto; }
.nav-links a {
  color: #9094b8; font-size: .83rem; text-decoration: none;
  padding: 0 .9rem; display: flex; align-items: center;
  border-bottom: 3px solid transparent; height: 52px; white-space: nowrap;
  transition: color .12s, border-color .12s;
}
.nav-links a:hover { color: #d0d4f0; }
.nav-links a.active { color: #fff; border-bottom-color: #7986cb; font-weight: 600; }

/* ── LAYOUT ──────────────────────────────────────────── */
.page-main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem; }

/* ── PAGE HEADER ─────────────────────────────────────── */
.page-hdr { margin-bottom: 1.25rem; }
.page-hdr-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.page-hdr h1 { font-size: 1.25rem; font-weight: 700; }
.page-hdr .sub { font-size: .83rem; color: #666; margin-top: .2rem; }

/* ── CARDS ───────────────────────────────────────────── */
.card { background: #fff; border-radius: 8px; padding: 1.2rem; box-shadow: 0 1px 3px rgba(0,0,0,.09); margin-bottom: 1rem; }
.card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; flex-wrap: wrap; gap: .5rem; }
.card-hdr h2 { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #666; }
.card-hdr .actions { display: flex; gap: .4rem; flex-wrap: wrap; }

/* ── STAT BOXES ─────────────────────────────────────── */
.stat-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: .75rem; margin-bottom: 1rem; }
.stat-box { background: #fff; border-radius: 8px; padding: .85rem 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.09); border-left: 4px solid #5c6bc0; }
.stat-box.s-blue   { border-left-color: #1e88e5; }
.stat-box.s-green  { border-left-color: #43a047; }
.stat-box.s-orange { border-left-color: #fb8c00; }
.stat-box.s-red    { border-left-color: #e53935; }
.stat-box.s-purple { border-left-color: #8e24aa; }
.stat-box.s-gray   { border-left-color: #9e9e9e; }
.stat-box .val { font-size: 1.55rem; font-weight: 700; color: #212121; line-height: 1.1; }
.stat-box .lbl { font-size: .73rem; color: #888; margin-top: .2rem; }

/* ── TABLES ──────────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .835rem; }
th { text-align: left; padding: .5rem .65rem; background: #f7f8fa; color: #555; font-weight: 600; border-bottom: 2px solid #e8eaed; white-space: nowrap; }
td { padding: .42rem .65rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbff; }

/* ── FORMS ───────────────────────────────────────────── */
input[type=text], input[type=number], input[type=url], select, input[type=search] {
  border: 1px solid #d0d4da; border-radius: 5px; padding: .4rem .7rem;
  font-size: .865rem; background: #fff; color: #1a1a1a; outline: none; font-family: inherit;
}
input:focus, select:focus { border-color: #5c6bc0; box-shadow: 0 0 0 3px rgba(92,107,192,.12); }
.field { display: flex; flex-direction: column; gap: .22rem; }
.field label { font-size: .77rem; color: #555; font-weight: 500; }
.form-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; }

/* ── BUTTONS ─────────────────────────────────────────── */
button, .btn {
  padding: .4rem .95rem; font-size: .845rem; border: none; border-radius: 5px;
  cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: .3rem;
  font-family: inherit; font-weight: 500; text-decoration: none; line-height: 1.4;
}
button:disabled, .btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary   { background: #5c6bc0; color: #fff; }
.btn-primary:hover   { background: #3949ab; }
.btn-secondary { background: #e8eaf6; color: #3949ab; }
.btn-secondary:hover { background: #c5cae9; }
.btn-success   { background: #43a047; color: #fff; }
.btn-success:hover   { background: #2e7d32; }
.btn-warn      { background: #fb8c00; color: #fff; }
.btn-warn:hover      { background: #e65100; }
.btn-danger    { background: #e53935; color: #fff; }
.btn-danger:hover    { background: #c62828; }
.btn-ghost     { background: transparent; color: #555; border: 1px solid #d0d4da; }
.btn-ghost:hover     { background: #f5f5f5; }
.btn-sm { padding: .22rem .6rem; font-size: .775rem; }
.btn-xs { padding: .15rem .45rem; font-size: .72rem; border-radius: 4px; }

/* ── BADGES ──────────────────────────────────────────── */
.tag { display: inline-flex; align-items: center; padding: .18rem .52rem; border-radius: 99px; font-size: .72rem; font-weight: 600; white-space: nowrap; }
.tag-ok      { background: #e8f5e9; color: #2e7d32; }
.tag-running { background: #e3f2fd; color: #1565c0; }
.tag-warn    { background: #fff8e1; color: #e65100; }
.tag-paused  { background: #f3e5f5; color: #7b1fa2; }
.tag-err     { background: #ffebee; color: #c62828; }
.tag-info    { background: #e1f5fe; color: #0277bd; }
.tag-muted   { background: #f0f0f0; color: #757575; }

/* ── ALERTS ──────────────────────────────────────────── */
.alert { padding: .6rem 1rem; border-radius: 5px; font-size: .85rem; margin-bottom: .7rem; display: none; }
.alert.ok   { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #43a047; }
.alert.err  { background: #ffebee; color: #c62828; border-left: 3px solid #e53935; }
.alert.info { background: #e3f2fd; color: #1565c0; border-left: 3px solid #42a5f5; }
.alert.warn { background: #fff8e1; color: #e65100; border-left: 3px solid #fb8c00; }

/* ── TABS ────────────────────────────────────────────── */
.tabs { display: flex; gap: 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 1rem; }
.tab-btn {
  padding: .55rem 1.1rem; border: none; background: transparent; cursor: pointer;
  font-size: .875rem; color: #666; border-bottom: 2px solid transparent;
  margin-bottom: -2px; font-family: inherit; white-space: nowrap;
}
.tab-btn:hover { color: #3949ab; }
.tab-btn.active { color: #3949ab; border-bottom-color: #5c6bc0; font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── PROGRESS ────────────────────────────────────────── */
.progress-wrap { display: flex; align-items: center; gap: .6rem; }
.progress-bar { background: #e0e0e0; border-radius: 99px; height: 7px; flex: 1; overflow: hidden; }
.progress-fill { background: #5c6bc0; height: 100%; border-radius: 99px; transition: width .4s; }
.progress-label { font-size: .78rem; color: #555; white-space: nowrap; min-width: 3.5rem; text-align: right; }

/* ── MISC ────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: .9rem; }
.url-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.url-cell a, a.link { color: #1a73e8; text-decoration: none; }
.url-cell a:hover, a.link:hover { text-decoration: underline; }
code { background: #f0f2f5; padding: .1em .35em; border-radius: 3px; font-size: .82em; font-family: monospace; }
.mono { font-family: monospace; font-size: .85em; }
.text-muted { color: #999; }
.text-right { text-align: right; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
.filter-row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: .9rem; }
.filter-row input, .filter-row select { min-width: 130px; }
.last-updated { font-size: .75rem; color: #aaa; font-style: italic; }
hr { border: none; border-top: 1px solid #e8eaed; margin: 1rem 0; }
@media (max-width: 720px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
  .nav-links a { padding: 0 .6rem; font-size: .78rem; }
  .stat-row { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">
    <a href="/dashboard">⚙ crawler<span class="dot">.</span>console</a>
  </div>
  <div class="nav-links">
    <a href="/dashboard" {% if page=='dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="/jobs"      {% if page=='jobs'      %}class="active"{% endif %}>Jobs</a>
    <a href="/logs"      {% if page=='logs'      %}class="active"{% endif %}>Logs</a>
    <a href="/errors"    {% if page=='errors'    %}class="active"{% endif %}>Errors</a>
    <a href="/pages"     {% if page=='pages'     %}class="active"{% endif %}>Pages</a>
    <a href="/search"    {% if page=='search'    %}class="active"{% endif %}>Search</a>
    <a href="/status"    {% if page=='status'    %}class="active"{% endif %}>Status</a>
  </div>
</nav>

<main class="page-main">
{% block content %}{% endblock %}
</main>

<script>
/* ── shared utilities ───────────────────────────────── */
const api = (path, opts) =>
  fetch(path, opts).then(r => r.json()).catch(() => ({ error: 'network error' }));

const STATUS_CLASS = {
  done:'tag-ok', running:'tag-running', pending:'tag-warn',
  paused:'tag-paused', failed:'tag-err', cancelled:'tag-err',
  html_success:'tag-ok', non_html:'tag-muted', http_error:'tag-err',
  network_error:'tag-err', invalid_input:'tag-err',
  fetched:'tag-ok', queued:'tag-warn', unfetched:'tag-muted',
  job_created:'tag-info', fetching:'tag-running',
  indexed:'tag-ok', parsed:'tag-info', completed:'tag-ok',
  resumed:'tag-ok', child_discovered:'tag-muted', child_admitted:'tag-info',
};
function tagClass(s) { return STATUS_CLASS[s] || 'tag-muted'; }

function tag(s) {
  return `<span class="tag ${tagClass(s)}">${s}</span>`;
}

function fmtTs(ts) {
  if (!ts) return '<span class="text-muted">—</span>';
  return ts.replace('T',' ').slice(0,19) + ' UTC';
}

function fmtRelative(ts) {
  if (!ts) return '—';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 5)   return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return fmtTs(ts);
}

function showAlert(id, text, type='ok') {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'alert ' + type;
  el.style.display = 'block';
  if (type === 'ok') setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function switchTab(groupId, name) {
  document.querySelectorAll(`[data-tabgroup="${groupId}"] .tab-btn`).forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  document.querySelectorAll(`[data-tabgroup="${groupId}"] .tab-panel`).forEach(p => {
    p.classList.toggle('active', p.dataset.tab === name);
  });
}

function progressBar(pct) {
  const p = Math.min(100, Math.max(0, pct || 0));
  return `<div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
    <span class="progress-label">${p.toFixed(0)}%</span>
  </div>`;
}

function urlCell(url, external=true) {
  if (!url) return '<span class="text-muted">—</span>';
  const tgt = external ? ' target="_blank"' : '';
  return `<div class="url-cell" title="${url}"><a href="${url}"${tgt}>${url}</a></div>`;
}

function jobLink(jobId) {
  return `<a href="/jobs/${jobId}" class="link mono">${jobId}</a>`;
}

function setLastUpdated(id) {
  const el = document.getElementById(id);
  if (el) el.textContent = 'Updated ' + fmtRelative(new Date().toISOString());
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
